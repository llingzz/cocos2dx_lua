syntax = "proto2";
package pb_common;

message data_head
{
	optional int32 protocol_code = 1;
	reserved 2 to 8;
	optional int32 data_len = 9;
	optional bytes data_str = 10;
}

enum protocol_code
{
	protocol_register = 1;
	protocol_register_response = 2;
	protocol_join_room = 3;
	protocol_join_room_response = 4;
	protocol_ready = 5;
	protocol_ready_response = 6;
	protocol_begin = 7;
	protocol_frame = 8;
	protocol_tcp_close = 9;
	protocol_leave_room = 10;
	protocol_leave_room_response = 11;
	protocol_ping = 12;
	protocol_pong = 13;
	protocol_repair_frames = 14;
	protocol_repair_frames_response = 15;
	protocol_login = 16;
	protocol_login_reponse = 17;
	protocol_sync_verify = 18;
	protocol_sync_verify_response = 19;
}

message data_user_register
{
	optional bytes username = 1;
	optional bytes password = 2;
}

message data_user_register_response
{
	optional int32 return_code = 1;
	optional int32 userid = 2;
}

message data_user_login
{
	optional int32 userid = 1;
	optional bytes password = 2;
}

message data_user_login_response
{
	optional int32 userid = 1;
	optional int32 ingame = 2;
	optional int32 roomid = 3;
	optional data_begin begin = 4;
	optional int32 frameid = 5;
}

message data_user_join_room
{
	optional int32 userid = 1;
}

message data_user_join_room_response
{
	optional int32 userid = 1;
	optional int32 roomid = 2;
}

message data_ready
{
	optional int32 userid = 1;
	optional int32 roomid = 2;
	reserved 3 to 8;
}

message data_ready_response
{
	optional int32 userid = 1;
	optional int32 roomid = 2;
	optional int32 return_code = 3;
	reserved 4 to 8;
}

message data_player_info
{
	optional int32 userid = 1;
	optional int32 index = 2;
}

message data_begin
{
	optional uint32 rand_seed = 1;
	repeated data_player_info playerinfos = 2;
}

enum ope_type
{
	opeMove = 1;
	opeFireBullet = 2;
}
message ope_move
{
	required int32 movex = 1;
	required int32 movey = 2;
	required int32 turn = 3;
}
message ope_fire_bullet
{
	required int32 startposx = 1;
	required int32 startposy = 2;
	required int32 directionx = 3;
	required int32 directiony = 4;
	required int32 rotation = 5;
}

message ope_detail
{
	optional int32 opetype = 1;
	optional bytes opestring = 2;
}

message data_ope
{
	optional int32 userid = 1;
	optional int32 frameid = 2;
	repeated ope_detail opecode = 3;
	optional int32 ackframeid = 4;
}

message data_frame
{
	optional int32 userid = 1;
	optional int32 frameid = 2;
	repeated ope_detail opecode = 3;
}

message data_ope_frames
{
	optional int32 frameid = 1;
	repeated data_frame frames = 2;
}

message data_frames
{
	repeated data_ope_frames frames = 1;
}

message data_tcp_close
{
	optional int32 userid = 1;
	optional int32 token = 2;
}

message data_user_leave_room
{
	optional int32 userid = 1;
	optional int32 roomid = 2;
}

message data_user_leave_room_response
{
	optional int32 userid = 1;
	optional int32 roomid = 2;
}

message data_ping
{
	optional int32 userid = 1;
	optional int32 idx = 2;
}

message data_pong
{
	optional int32 userid = 1;
	optional int32 idx = 2;
}

message data_repair_frames
{
	optional int32 userid = 1;
	optional int32 roomid = 2;
	optional int32 flag = 3;
}

message data_repair_frames_response
{
	optional int32 flag = 1;
	repeated data_ope_frames frames = 2;
}

message data_sync_verify
{
	optional int32 frameid = 1;
	optional int32 statehash = 2;
	optional int32 roomid = 3;
	optional int32 userid = 4;
}